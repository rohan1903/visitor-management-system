<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-red-50 via-slate-50 to-red-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-red-100 p-8 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-red-100 rounded-full mb-5">
            <i class="fas fa-server text-3xl text-red-500"></i>
        </div>
        <h1 class="text-5xl font-extrabold text-gray-300 mb-2">500</h1>
        <h2 class="text-xl font-bold text-gray-800 mb-3">Internal server error</h2>
        <p class="text-gray-600 mb-6">Something went wrong on our end. Please try again later.</p>
        <a href="/"
           class="inline-flex items-center justify-center px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow transition">
            <i class="fas fa-home mr-2"></i> Return to Home
        </a>
    </div>
</body>
</html>
